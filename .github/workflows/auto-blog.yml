name: Auto-Generate Blog Post

on:
  schedule:
    # Monday, Wednesday, Friday at 10:00 UTC
    - cron: "0 10 * * 1,3,5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install tsx (script runner)
        run: pnpm add -D tsx

      - name: Ensure content directory exists
        run: mkdir -p content/blog

      - name: Generate blog post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: npx tsx scripts/generate-blog-post.ts

      - name: Commit and push new blog post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new blog post to commit"
            exit 0
          fi
          TITLE="${{ steps.generate.outputs.title }}"
          if [ -z "$TITLE" ]; then
            TITLE="new article"
          fi
          git commit -m "blog: auto-generated post - ${TITLE}"
          git push
